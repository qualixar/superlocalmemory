schema_version: 1
release: "3.7.0"
release_name: "Memory Integrity"
source_baseline: "main@631c6af"
decision: "one public V3.7 release with internal alpha, beta, and RC gates"
generated_on: "2026-07-14"

status_flow:
  - open
  - reproduced
  - fix_in_review
  - code_complete
  - proof_pending
  - verified

closure_modes:
  fix: "Implement the supported contract correctly."
  remove: "Delete dead or unsafe behavior and every public contract that names it."
  narrow: "Reduce the supported contract to truthful, fully tested behavior."
  prove: "Retain the capability only after release-linked evidence exists."

release_rule: "Every defect must be verified before the stable 3.7.0 release."
dependency_rule: "Dependencies gate transition to verified; implementation and proof may proceed in parallel."

discovery_policy:
  next_id_rule: "Use the next unused ID within the evidence-based severity."
  register_before_fix: true
  require_reproduction: true
  require_impact_analysis: true
  require_failing_regression: true
  independent_verification: true
  blocking_categories:
    - data_correctness
    - security
    - privacy
    - scope_isolation
    - prompt_injection
    - migration
    - recovery
    - package_integrity
    - benchmark_integrity
    - public_claims
  material_scope_expansion_requires_adr: true

