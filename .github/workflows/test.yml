name: Tests
on: [push, pull_request]
jobs:
  security:
    name: Dependency and static security gates
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8
      - name: Audit locked runtime dependencies
        shell: bash
        run: |
          uv export --no-dev --no-emit-project --format requirements-txt \
            --output-file /tmp/slm-runtime-requirements.txt
          uvx --from pip-audit==2.9.0 pip-audit \
            --requirement /tmp/slm-runtime-requirements.txt \
            --no-deps --disable-pip \
            --ignore-vuln PYSEC-2026-597 \
            --ignore-vuln GHSA-rrmf-rvhw-rf47 \
            --ignore-vuln PYSEC-2026-3447
      - name: Reject high-confidence high-severity Python findings
        run: uvx --from bandit==1.8.6 bandit -r src/superlocalmemory -q -lll -iii

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install libomp (macOS — required by lightgbm)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Install package
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .
        shell: bash

      - name: Install portalocker (Windows file locking)
        if: runner.os == 'Windows'
        run: pip install portalocker

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio sqlite-vec

      - name: Run tests
        shell: bash
        run: |
          python -m pytest tests/ -q --tb=short -x \
            --ignore=tests/test_integration/test_mode_b_ollama.py \
            --ignore=tests/test_integration/test_e2e.py \
            --ignore=tests/test_integration/test_e2e_v32.py \
            --ignore=tests/test_integration/test_e2e_v33.py \
            --ignore=tests/test_benchmarks/ \
            --ignore=tests/graph/test_cozo_backend.py \
            --ignore=tests/vector/test_lancedb_backend.py

  native-lancedb:
    name: Native LanceDB (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install native backend test environment
        run: python -m pip install --disable-pip-version-check -e ".[dev,lancedb]"
      - name: Run LanceDB in a dedicated process lane
        run: python -m pytest -q -m native tests/vector
