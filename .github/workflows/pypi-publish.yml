name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/superlocalmemory/
    steps:
      - uses: actions/checkout@v4

      - name: Verify version sync (tag == package.json == pyproject.toml)
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(grep -m1 '"version"' package.json | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')
          PY=$(grep -m1 '^version' pyproject.toml | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          echo "tag=$TAG package.json=$PKG pyproject.toml=$PY"
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$PY" ]; then
            echo "::error::Version mismatch — tag=$TAG package.json=$PKG pyproject.toml=$PY"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests before publish
        run: |
          uv run --with pytest --with pytest-asyncio python -m pytest tests/ -q --tb=short -x \
            --ignore=tests/test_integration/test_mode_b_ollama.py \
            --ignore=tests/test_integration/test_e2e.py \
            --ignore=tests/test_integration/test_e2e_v32.py \
            --ignore=tests/test_integration/test_e2e_v33.py \
            --ignore=tests/test_benchmarks/ \
            --ignore=tests/graph/test_cozo_backend.py \
            --ignore=tests/vector/test_lancedb_backend.py

      - name: Build package
        run: uv build

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
